name: CI + CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML exists
        run: test -f index.html
      - name: Validate HTML structure
        run: |
          grep -q '<html' index.html
          grep -q '<head' index.html
          grep -q '<body' index.html
          echo "✅ HTML structure valid"

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json,next.config.js"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Start/Restart app with PM2 and configure Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            npm ci --omit=dev
            pm2 restart alpha || pm2 start npm --name "alpha" -- start
            pm2 save

            # Setup Nginx reverse proxy for /alpha path
            printf 'server {\n    listen 80;\n    server_name labs89.hpc-ignite.org;\n\n    location /alpha {\n        proxy_pass http://localhost:3000;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n    }\n}\n' | sudo tee /etc/nginx/sites-available/alpha > /dev/null
            sudo ln -sf /etc/nginx/sites-available/alpha /etc/nginx/sites-enabled/alpha
            sudo nginx -t && sudo service nginx reload
            echo "✅ Deploy สำเร็จ"
